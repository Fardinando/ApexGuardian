{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">➕ Novo Administrador</h1>

    <div class="card">
        <form method="POST" action="/admin/admins/add" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Nome de usuário</label>
                <input type="text" name="username" required minlength="3" maxlength="50"
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Senha</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Role</label>
                <select name="role" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="basic">Basic (leitura)</option>
                    <option value="analyst">Analyst (investigação)</option>
                    <option value="operator">Operator (correção + deploy)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-full">Criar Administrador</button>
            <a href="/admin/admins" class="btn btn-ghost w-full text-center">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
