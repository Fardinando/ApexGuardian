{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-2">🔑 Trocar Senha</h1>
    <p class="text-gray-400 mb-6">Alterando senha de <strong>{{ target.username }}</strong> ({{ target.role }})</p>

    <div class="card">
        <form method="POST" action="/admin/admins/{{ target.id }}/password">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">Nova Senha</label>
                <input type="text" name="password" required minlength="6"
                       class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white focus:border-blue-500 focus:outline-none"
                       placeholder="Mínimo 6 caracteres">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">💾 Salvar</button>
                <a href="/admin/admins" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
